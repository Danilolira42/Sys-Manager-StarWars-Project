quarkus.http.cors.enabled=true 
quarkus.http.cors.origins=http://localhost:5173 - {YOUR FRONT_END LOCALHOST_HERE}
quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS 
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Disposition 
quarkus.http.cors.access-control-max-age=24H 
quarkus.http.cors.access-control-allow-credentials=true 

quarkus.datasource.db-kind=mysql
quarkus.datasource.username=root
quarkus.datasource.password={YOUR_PASSWORD HERE}
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/starwarsdb {YOUR DATABASE LOCALHOST_HERE}
quarkus.datasource.jdbc.max-size=16

quarkus.rest-client.swapi.url=https://swapi.dev/api
